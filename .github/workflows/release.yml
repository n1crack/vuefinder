name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Upgrade npm
        # Trusted Publishing (OIDC) requires npm >= 11.5.1.
        run: npm install -g npm@latest

      - name: Verify tag matches package.json version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_NAME" ]; then
            echo "::error::Release tag v$TAG_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Publishing version $PKG_VERSION"

      - name: Install dependencies
        run: npm ci
        env:
          # Cypress is only needed for local e2e tests, not for publishing.
          CYPRESS_INSTALL_BINARY: 0

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
